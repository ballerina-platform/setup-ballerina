name: Pull Request

on:
  pull_request:

jobs:
  test:
    name: Test action on ${{ matrix.name }} (${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
            variant: stable
            balVersion: 2201.13.3
          - name: Ubuntu
            os: ubuntu-latest
            variant: nightly
            balVersion: nightly-2201.13.x
          - name: MacOS
            os: macos-latest
            variant: stable
            balVersion: 2201.13.3
          - name: MacOS
            os: macos-latest
            variant: nightly
            balVersion: nightly-2201.13.x
          - name: Windows
            os: windows-latest
            variant: stable
            balVersion: 2201.13.3
          - name: Windows
            os: windows-latest
            variant: nightly
            balVersion: nightly-2201.13.x
    steps:
      - uses: actions/checkout@v2
      - uses: ./
        name: Test the action.
        with:
          version: ${{ matrix.balVersion }}
      - run: bal version
      - run: bal run hello.bal
